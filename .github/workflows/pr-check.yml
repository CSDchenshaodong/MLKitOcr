name: PR Check
on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Fix gradlew permission
        run: chmod +x gradlew
      - name: Run lint
        run: ./gradlew lintDebug --continue
      - name: Upload lint report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Fix gradlew permission
        run: chmod +x gradlew
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Fix gradlew permission
        run: chmod +x gradlew
      - name: Assemble
        run: ./gradlew assembleDebug
