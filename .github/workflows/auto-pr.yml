name: Auto Create PR
on:
  push:
    branches:
      - 'feature/**'

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: read
    steps:
      - uses: actions/checkout@v4

      - name: Auto create PR
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const title = branch
              .replace(/^feature\//, '')
              .replace(/[/-]/g, ' ')
              .replace(/\b\w/g, c => c.toUpperCase());

            // 检查是否已有该分支的 PR
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            if (existingPRs.length > 0) {
              console.log(`PR already exists: #${existingPRs[0].number}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `feat: ${title}`,
              head: branch,
              base: 'main',
              body: `## 🤖 自动创建的 PR\n\n分支 \`${branch}\` 已推送，自动提交 PR 进行 CI 检查。\n\nCI 通过后自动合并。`
            });

            console.log(`PR created: #${pr.number} ${pr.html_url}`);

            // 启用自动合并
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              auto_merge: {
                merge_method: 'squash'
              }
            });

            console.log(`Auto-merge enabled for PR #${pr.number}`);
