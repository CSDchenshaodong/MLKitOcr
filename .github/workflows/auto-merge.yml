name: Auto Merge
on:
  workflow_run:
    workflows: ["PR Check"]
    types:
      - completed

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.workflow_run.head_branch;
            if (!branch.startsWith('feature/')) {
              console.log(`跳过非 feature 分支: ${branch}`);
              return;
            }
            if (context.payload.workflow_run.conclusion !== 'success') {
              console.log(`Workflow 未通过: ${context.payload.workflow_run.conclusion}`);
              return;
            }
            console.log(`查找分支 ${branch} 的 open PR`);
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            if (prs.length === 0) {
              console.log(`未找到 open PR`);
              return;
            }
            const pr = prs[0];
            console.log(`合并 PR #${pr.number}: ${pr.title}`);
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: pr.title
              });
              console.log(`PR #${pr.number} 已合并`);
            } catch (e) {
              console.log(`合并失败: ${e.message}`);
            }
