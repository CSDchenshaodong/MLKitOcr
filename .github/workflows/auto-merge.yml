name: Auto Merge
on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  status: []

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  auto-merge:
    if: >
      github.event_name == 'check_suite' &&
      github.event.check_suite.conclusion == 'success' &&
      startsWith(github.event.check_suite.head_branch, 'feature/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.check_suite.head_branch;
            console.log(`检查分支 ${branch} 的 PR 状态`);

            // 查找该分支的 open PR
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            if (prs.length === 0) {
              console.log(`没有找到分支 ${branch} 的 open PR`);
              return;
            }

            const pr = prs[0];

            // 获取 PR 的所有检查
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });

            const allPassed = checks.check_runs.every(
              c => c.conclusion === 'success' || c.conclusion === 'skipped' || c.conclusion === 'neutral'
            );
            const anyFailed = checks.check_runs.some(
              c => c.conclusion === 'failure' || c.conclusion === 'cancelled' || c.conclusion === 'timed_out'
            );

            console.log(`PR #${pr.number}: 全部通过=${allPassed}, 有失败=${anyFailed}`);

            if (anyFailed) {
              console.log(`PR #${pr.number} 有失败的检查，不合并`);
              return;
            }

            if (!allPassed) {
              console.log(`PR #${pr.number} 部分检查尚未完成，等待`);
              return;
            }

            // 尝试合并
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: pr.title
              });
              console.log(`PR #${pr.number} 已合并`);
            } catch (e) {
              console.log(`合并失败: ${e.message}`);
              // 退回到 auto_merge
              try {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  auto_merge: { merge_method: 'squash' }
                });
                console.log(`已启用 auto_merge 作为后备`);
              } catch (e2) {
                console.log(`auto_merge 也失败: ${e2.message}`);
              }
            }
